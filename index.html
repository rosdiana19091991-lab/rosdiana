  <script>
        const quizData = [
            { options: ["Mencair", "Membeku", "Menguap", "Mengembun"], answer: 0 },
            { options: ["Menguap", "Membeku", "Mencair", "Menyublim"], answer: 1 },
            { options: ["Mengembun", "Menguap", "Mencair", "Mengkristal"], answer: 1 },
            { options: ["Menyublim", "Mencair", "Mengembun", "Membeku"], answer: 2 },
            { options: ["Mengkristal", "Menguap", "Menyublim", "Mencair"], answer: 2 },
            { options: ["Padat ke cair", "Cair ke gas", "Gas ke cair", "Cair ke padat"], answer: 1 },
            { options: ["Gas ke padat", "Padat ke gas", "Cair ke padat", "Gas ke cair"], answer: 3 },
            { options: ["Mencair", "Menyublim", "Mengkristal", "Menguap"], answer: 1 },
            { options: ["Menguap", "Mengembun", "Mencair", "Membeku"], answer: 1 },
            { options: ["Membeku", "Mencair", "Mengkristal", "Menyublim"], answer: 2 }
        ];

        let current = 0, score = 0, answered = false;

        function renderOptions() {
            quizData.forEach((q, i) => {
                const container = document.getElementById('options-' + i);
                q.options.forEach((opt, oi) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'option-btn w-full text-left px-4 py-3 rounded-lg border-2 border-gray-200 bg-white font-medium hover:border-amber-400';
                    btn.textContent = opt;
                    btn.addEventListener('click', () => handleAnswer(i, oi, btn, container));
                    container.appendChild(btn);
                });
            });
        }

        function handleAnswer(qIndex, optIndex, btn, container) {
            if (answered || qIndex !== current) return;
            answered = true;
            const correct = quizData[qIndex].answer;
            if (optIndex === correct) { score++; btn.classList.add('correct'); }
            else { btn.classList.add('wrong'); container.children[correct].classList.add('correct'); }
            [...container.children].forEach(b => b.disabled = true);
            document.getElementById('next-wrap').classList.remove('hidden');
        }

        function nextQuestion() {
            document.querySelectorAll('.question-slide')[current].classList.add('hidden');
            current++;
            if (current >= quizData.length) { showResult(); return; }
            document.querySelectorAll('.question-slide')[current].classList.remove('hidden');
            document.getElementById('progress-fill').style.width = ((current + 1) * 10) + '%';
            document.getElementById('next-wrap').classList.add('hidden');
            answered = false;
        }

        function showResult() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('next-wrap').classList.add('hidden');
            document.getElementById('progress-bar').classList.add('hidden');
            const rs = document.getElementById('result-screen');
            rs.classList.remove('hidden');
            document.getElementById('score-text').textContent = score + ' / 10';
            const msg = score >= 8 ? '🌟 Luar biasa! Kamu hebat!' : score >= 5 ? '👍 Bagus! Terus belajar ya!' : '💪 Semangat! Coba lagi ya!';
            document.getElementById('result-msg').textContent = msg;
        }

        function reset() {
            current = 0; score = 0; answered = false;
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('progress-bar').classList.remove('hidden');
            document.getElementById('progress-fill').style.width = '10%';
            document.querySelectorAll('.question-slide').forEach((s, i) => s.classList.toggle('hidden', i !== 0));
            document.querySelectorAll('.option-btn').forEach(b => { b.disabled = false; b.classList.remove('correct', 'wrong'); });
        }

        document.getElementById('next-btn').addEventListener('click', nextQuestion);
        document.getElementById('retry-btn').addEventListener('click', reset);
        renderOptions();
        lucide.createIcons();
    </script>
